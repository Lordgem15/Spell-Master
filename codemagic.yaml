workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Generate Gradle wrapper (if missing)
        script: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper
            chmod +x ./gradlew
          fi
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
